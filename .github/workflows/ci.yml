name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.12
      - name: Install (dev extras)
        run: uv sync --extra dev
      - name: Ruff
        run: uv run ruff check src tests
      - name: Pytest
        run: uv run pytest -q
